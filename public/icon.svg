  <ellipse cx="16" cy="15" rx="8.5" ry="2.8" fill="#cdd4d0" opacity="0.4"/>

  <!-- Top stone: dark gray -->
  <ellipse cx="16" cy="9.5" rx="6" ry="2.8" fill="url(#t)"/>
