<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PebelAi">
  <defs>
    <radialGradient id="b" cx="42%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#2a7d53"/>
      <stop offset="100%" stop-color="#155232"/>
    </radialGradient>
    <radialGradient id="m" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#d2d8d4"/>
      <stop offset="100%" stop-color="#a6aeaa"/>
    </radialGradient>
    <radialGradient id="t" cx="40%" cy="28%" r="65%">
