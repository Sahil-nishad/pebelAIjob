  <ellipse fill="#1a6b3f" cx="40" cy="52" rx="34" ry="13"/>

  <!-- Mid stone -->
  <ellipse fill="rgba(0,0,0,0.07)" cx="40" cy="35" rx="24" ry="5"/>
  <ellipse fill="#2d8a52" cx="40" cy="30" rx="23" ry="10"/>

