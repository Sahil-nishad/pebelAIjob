<svg viewBox="0 0 320 78" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PebelAi">
  <defs>
    <!-- Bottom stone: dark green -->
    <radialGradient id="stoneBot" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2a7d53"/>
      <stop offset="100%" stop-color="#165535"/>
    </radialGradient>
    <!-- Middle stone: light gray -->
    <radialGradient id="stoneMid" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#d4d9d6"/>
      <stop offset="100%" stop-color="#a8b0ac"/>
    </radialGradient>
    <!-- Top stone: dark gray -->
    <radialGradient id="stoneTop" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7a8580"/>
      <stop offset="100%" stop-color="#4a5450"/>
    </radialGradient>
  </defs>

  <!-- ── Stacked stones ── -->

  <!-- Bottom stone shadow -->
  <ellipse cx="33" cy="67" rx="30" ry="6" fill="#0d3d22" opacity="0.18"/>

  <!-- Bottom stone: dark green, widest -->
  <ellipse cx="33" cy="62" rx="30" ry="9.5" fill="url(#stoneBot)"/>
  <ellipse cx="33" cy="59" rx="30" ry="8" fill="url(#stoneBot)"/>
  <ellipse cx="33" cy="57.5" rx="28" ry="6" fill="#1e7045" opacity="0.35"/>

  <!-- Middle stone: light gray -->
  <ellipse cx="32" cy="46" rx="21" ry="7.5" fill="url(#stoneMid)"/>
  <ellipse cx="32" cy="44" rx="21" ry="6.5" fill="url(#stoneMid)"/>
  <ellipse cx="32" cy="42.5" rx="19" ry="4.5" fill="#cdd4d0" opacity="0.5"/>

  <!-- Top stone: dark gray -->
  <ellipse cx="31" cy="33" rx="13.5" ry="5.5" fill="url(#stoneTop)"/>
  <ellipse cx="31" cy="31.5" rx="13.5" ry="5" fill="url(#stoneTop)"/>
  <ellipse cx="31" cy="30" rx="11.5" ry="3" fill="#7a8580" opacity="0.45"/>

  <!-- ── Text ── -->

  <!-- "PebelAi" -->
  <text
    x="76" y="52"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#363e3b"
  >PebelAi</text>

  <!-- Tagline: "Apply. Track. Get Hired." -->
  <text
    x="78" y="65"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="500"
    fill="#7a8480"
  >Apply. Track. <tspan fill="#1a6b42" font-weight="600">Get Hired.</tspan></text>
</svg>
